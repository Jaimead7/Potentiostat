[app]
name = "CopoPotentiostat"
version = "0.0.1"
theme = "copoTheme"
loggingLevel = "Debug"

[plot]
colors = [
    "00FF00",
    "FF0000",
    "0000FF",
    "FFFF00",
    "FF00FF",
    "00FFFF",
]
lineWidth = 20
updateInterval = 200

[serial]
baudRate = 115200
dataBits = 8
parity = 0
stopBits = 1
endCharacter = "\\r\\n"

[serial.commands]
ok = "$OK->"
potentiometry = "$PT"
cyclicVoltammetry = "$CV"
start = "$START"
stop = "$STOP"
end = "$END"
timestamp = "$TS:"
voltage = "$V:"
current = "$A:"
cycle = "$CC:"
taskDelay = "$TD:"
voltageSP = "$VSP:"
duration = "$D:"
threshold = "$TH:"
totalCycle = "$TC:"
slewRate = "$SR:"
startVoltage = "$SRTV:"
peakVoltage = "$PV:"
stopVoltage = "$STPV:"

[cycles.potentiometry]
taskDelay = 200
voltageSP = 0.6
duration = 120000
threshold = 9.99

[cycles.cyclicVoltammetry]
taskDelay = 50
cycles = 1
slewRate = 100.0
startVoltage = -0.5
peakVoltage = 0.9
stopVoltage = -0.5
