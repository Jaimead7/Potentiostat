[app]
name = "CopoPotentiostat"
version = "0.0.1"
theme = "copoTheme"
loggingLevel = "Debug"

[plot]
colors = [
    "00FF00",
    "FF0000",
    "0000FF",
    "FFFF00",
    "FF00FF",
    "00FFFF",
]
lineWidth = 20
updateInterval = 200

[serial]
baudRate = 115200
dataBits = 8
parity = 0
stopBits = 1
endCharacter = "\\r\\n"

[serial.commands]
ok = "$OK->"
params = "$PARAMS"
start = "$START"
stop = "$STOP"
end = "$END"
timestamp = "$TS:"
voltage = "$V:"
current = "$A:"
taskDelay = "$TD:"
potentiometry = "$PT"
voltageSP = "$VSP:"
duration = "$D:"
threshold = "$TH:"
cyclicVoltammetry = "$CV"
cycle = "$CC:"
totalCycle = "$TC:"
slewRate = "$SR:"
startVoltage = "$SRTV:"
peakVoltage = "$PV:"
stopVoltage = "$STPV:"
circuit = "$CIR"
r1 = "$R1:"
r2 = "$R2:"
r3 = "$R3:"
r4 = "$R4:"
r5 = "$R5:"
r6 = "$R6:"
vb1 = "$VB1:"
vb2 = "$VB2:"
opampVccP = "$OPAMP_VCC_P:"
opampVccN = "$OPAMP_VCC_N:"
opampHR = "$OPAMP_HR:"
opampBR = "$OPAMP_BR:"

[cycles.potentiometry]
taskDelay = 50
voltageSP = 0.6
duration = 120000
threshold = 9.99

[cycles.cyclicVoltammetry]
taskDelay = 50
cycles = 1
slewRate = 100.0
startVoltage = -0.5
peakVoltage = 0.9
stopVoltage = -0.5
