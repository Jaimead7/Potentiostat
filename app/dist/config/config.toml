[app]
name = "CopoPotentiostat"
version = "0.0.1"
theme = "copoTheme"
loggingLevel = "Debug"

[plot]
colors = [
    "00FF00",
    "FF0000",
    "0000FF",
    "FFFF00",
    "FF00FF",
    "00FFFF",
]
lineWidth = 20
updateInterval = 200

[serial]
baudRate = 115200
dataBits = 8
parity = 0
stopBits = 1
endCharacter = "\\r\\n"

[serial.commands]
ok = "$OK->"
params = "$PARAMS"
start = "$START"
stop = "$STOP"
end = "$END"
timestamp = "$TS:"
voltage = "$V:"
current = "$A:"
taskDelay = "$TD:"
startVoltage = "$SRTV:"
stopVoltage = "$STPV:"
redLimit = "$RL:"
yellowLimit = "$YL:"
potentiometry = "$PT"
voltageSP = "$VSP:"
duration = "$D:"
threshold = "$TH:"
cyclicVoltammetry = "$CV"
cycle = "$CC:"
totalCycle = "$TC:"
slewRate = "$SR:"
peakVoltage = "$PV:"
squareWaveVoltammetry = "$SWV"
stepSize = "$SS:"
pulseAmplitude = "$PA:"
frequency = "$FQ:"
maxCurrent = "$MC:"
equilTime = "$ET:"
fordwardVoltage = "$FV:"
fordwardCurrent = "$FC:"
reverseVoltage = "$RV:"
reverseCurrent = "$RC:"
diffCurrent = "$DC:"
circuit = "$CIR"
r1 = "$R1:"
r2 = "$R2:"
r3 = "$R3:"
r4 = "$R4:"
r5 = "$R5:"
r6 = "$R6:"
vb1 = "$VB1:"
vb2 = "$VB2:"
opampVccP = "$OPAMP_VCC_P:"
opampVccN = "$OPAMP_VCC_N:"
opampHR = "$OPAMP_HR:"
opampBR = "$OPAMP_BR:"

[boards.arduino]
vcc = 5.0
pwmRes = 8
adcRes = 10

[boards.esp32]
vcc = 3.3
pwmRes = 11
adcRes = 12

[circuit]
r1 = 10000
r2 = 330
r3 = 1000
r4 = 220
r5 = 47000
r6 = 15000
vb1 = -5.0
vb2 = -5.0
opampVccP = 12.0
opampVccN = -12.0
opampHR = 1.5
opampBR = 0.0

[cycles.potentiometry]
taskDelay = 50
redLimit = 50.0
yellowLimit = 25.0
voltageSP = 0.6
duration = 120000
threshold = 9.0

[cycles.cyclicVoltammetry]
taskDelay = 50
redLimit = 50.0
yellowLimit = 25.0
slewRate = 100.0
cycles = 1
startVoltage = -0.5
stopVoltage = -0.5
peakVoltage = 0.9

[cycles.squareWaveVoltammetry]
taskDelay = 50
redLimit = 50.0
yellowLimit = 25.0
startVoltage = -0.2
stopVoltage = 1.0
stepSize = 0.005
pulseAmplitude = 0.05
frequency = 2.0
maxCurrent = 999.99
equilTime = 5000
